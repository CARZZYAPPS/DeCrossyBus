# DeCrossyBus: Balanced Lanes

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeCrossyBus</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #a3d062;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;

            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
        }

        #score {
            font-size: 48px;
            font-weight: bold;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;

            justify-content: center;
            align-items: center;
            color: white;
            transition: opacity 0.5s;
            z-index: 10;
        }

        #overlay h1 {
            font-size: 64px;
            margin-bottom: 10px;
            color: #ffdb00;
            text-shadow: 4px 4px 0px #000;
        }

        #overlay p {
            font-size: 20px;
            margin-bottom: 30px;
        }


        button {
            padding: 15px 40px;
            font-size: 24px;
            background-color: #ffdb00;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            color: #333;
            box-shadow: 0 4px 0 #b39a00;
            transition: transform 0.1s, box-shadow 0.1s;
            pointer-events: auto;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #b39a00;
        }


        .hidden {
            display: none !important;
            opacity: 0;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="score">0</div>
    </div>

    <div id="overlay">
        <h1 id="overlay-title">DeCrossyBus</h1>
        <p id="overlay-desc">Use Arrow Keys or WASD. Hop on logs to cross rivers!</p>
        <button id="start-btn">START DRIVE</button>
    </div>

    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    
    <script>
        // Constants & Configuration
        const COLUMN_WIDTH = 40;
        const LANE_WIDTH = 40;
        const BUS_SIZE = 16;
        
        let scene, camera, renderer;
        let bus;
        let lanes = [];
        let currentLane = 0;
        let score = 0;
        let gameActive = false;
        
        const laneTypes = ['forest', 'road', 'river', 'rail', 'road', 'forest'];
        const carColors = [0xff4444, 0x4444ff, 0xeeeeee, 0x333333];

        // Initialize Game
        function init() {

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xa3d062);

            const aspect = window.innerWidth / window.innerHeight;
            const d = 150;
            camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 1, 2000);
            camera.position.set(100, 250, -200);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);

            dirLight.position.set(100, 200, 50);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 1024;
            dirLight.shadow.mapSize.height = 1024;
            dirLight.shadow.camera.left = -500;
            dirLight.shadow.camera.right = 500;
            dirLight.shadow.camera.top = 500;
            dirLight.shadow.camera.bottom = -500;
            scene.add(dirLight);

            createBus();
            setupInitialLanes();

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('keydown', handleKeyDown);
            
            document.getElementById('start-btn').onclick = startGame;

            animate();

        }

        function createBus() {
            const busGroup = new THREE.Group();

            // Main yellow body
            const bodyGeo = new THREE.BoxGeometry(BUS_SIZE, 10, BUS_SIZE * 1.5);
            const bodyMat = new THREE.MeshPhongMaterial({ color: 0xffdb00 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 7;
            body.castShadow = true;
            busGroup.add(body);

            // Roof
            const roofGeo = new THREE.BoxGeometry(BUS_SIZE, 2, BUS_SIZE * 1.5);
            const roof = new THREE.Mesh(roofGeo, bodyMat);
            roof.position.y = 13;
            busGroup.add(roof);


            // Windows (Front)
            const winMat = new THREE.MeshPhongMaterial({ color: 0x33aaff });
            const fWinGeo = new THREE.BoxGeometry(BUS_SIZE - 2, 4, 1);
            const fWin = new THREE.Mesh(fWinGeo, winMat);
            fWin.position.set(0, 10, BUS_SIZE * 0.75);
            busGroup.add(fWin);

            // Text Label Implementation
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffdb00';
            ctx.fillRect(0, 0, 256, 64);
            ctx.fillStyle = 'black';
            ctx.font = 'bold 44px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('DeBus', 128, 32);


            const textTexture = new THREE.CanvasTexture(canvas);
            const textMat = new THREE.MeshPhongMaterial({ map: textTexture, transparent: true });
            const textGeo = new THREE.PlaneGeometry(BUS_SIZE * 1.2, 4);

            const leftText = new THREE.Mesh(textGeo, textMat);
            leftText.position.set(BUS_SIZE / 2 + 0.1, 8, 0);
            leftText.rotation.y = Math.PI / 2;
            busGroup.add(leftText);

            const rightText = new THREE.Mesh(textGeo, textMat);
            rightText.position.set(-(BUS_SIZE / 2 + 0.1), 8, 0);
            rightText.rotation.y = -Math.PI / 2;
            busGroup.add(rightText);

            // Wheels
            const wheelGeo = new THREE.BoxGeometry(4, 4, 4);
            const wheelMat = new THREE.MeshPhongMaterial({ color: 0x222222 });
            const positions = [[-7, 2, 7], [7, 2, 7], [-7, 2, -7], [7, 2, -7]];
            positions.forEach(pos => {

                const wheel = new THREE.Mesh(wheelGeo, wheelMat);
                wheel.position.set(...pos);
                busGroup.add(wheel);
            });

            bus = busGroup;
            bus.position.set(0, 0, 0);
            scene.add(bus);
        }

        // Environment Helpers
        function createTree() {
            const tree = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.BoxGeometry(6, 12, 6), new THREE.MeshPhongMaterial({ color: 0x4d2926 }));
            trunk.position.y = 6; tree.add(trunk);
            const leaves = new THREE.Mesh(new THREE.BoxGeometry(16, 16, 16), new THREE.MeshPhongMaterial({ color: 0x4b7f52 }));
            leaves.position.y = 20; tree.add(leaves);
            return tree;
        }


        function createRock() {
            const rock = new THREE.Mesh(new THREE.BoxGeometry(12, 8, 12), new THREE.MeshPhongMaterial({ color: 0x888888 }));
            rock.position.y = 4; rock.castShadow = true; return rock;
        }

        function createLog() {
            const log = new THREE.Mesh(new THREE.BoxGeometry(45, 6, 25), new THREE.MeshPhongMaterial({ color: 0x7a4d2e }));
            log.position.y = 3; log.castShadow = true; return log;
        }

        function createTrain() {
            const train = new THREE.Group();
            const carMat = new THREE.MeshPhongMaterial({ color: 0x333333 });
            const body = new THREE.Mesh(new THREE.BoxGeometry(250, 18, 25), carMat);
            body.position.y = 12; train.add(body);
            const front = new THREE.Mesh(new THREE.BoxGeometry(20, 10, 25), new THREE.MeshPhongMaterial({color: 0xff4444}));
            front.position.set(125, 12, 0); train.add(front);
            return train;
        }


        function createLane(index) {
            // Check previous lane to avoid consecutive hazards
            const prevLane = lanes[lanes.length - 1];
            const prevType = prevLane ? prevLane.type : 'forest';
            
            let type;
            if (index <= 0) {
                type = 'forest';
            } else if (prevType === 'river' || prevType === 'rail') {
                // Force a non-hazard lane after a river or rail
                const safeTypes = ['forest', 'road'];
                type = safeTypes[Math.floor(Math.random() * safeTypes.length)];
            } else {
                type = laneTypes[Math.floor(Math.random() * laneTypes.length)];
            }

            const laneGroup = new THREE.Group();
            laneGroup.position.z = index * LANE_WIDTH;


            let color = 0x93c052;
            if (type === 'road') color = 0x444444;
            if (type === 'river') color = 0x3366ff;
            if (type === 'rail') color = 0x666666;

            const plane = new THREE.Mesh(
                new THREE.PlaneGeometry(2000, LANE_WIDTH),
                new THREE.MeshPhongMaterial({ color })
            );
            plane.rotation.x = -Math.PI / 2;
            plane.receiveShadow = true;
            laneGroup.add(plane);

            const laneData = {
                index, type, mesh: laneGroup,
                vehicles: [], solids: [], movingObjs: [],
                direction: Math.random() > 0.5 ? 1 : -1,
                speed: 0.8 + Math.random() * 1.2,
                trainTimer: 0,

                warningMesh: null
            };

            if (type === 'forest') {
                for (let i = -15; i < 15; i++) {
                    if (index === 0 && Math.abs(i) < 2) continue;
                    const xPos = i * COLUMN_WIDTH;
                    const rand = Math.random();
                    if (rand < 0.15) {
                        const tree = createTree(); tree.position.x = xPos; laneGroup.add(tree);
                    } else if (rand < 0.05) {
                        const rock = createRock(); rock.position.x = xPos; laneGroup.add(rock);
                        laneData.solids.push(xPos);
                    }
                }
            } else if (type === 'rail') {
                const track1 = new THREE.Mesh(new THREE.PlaneGeometry(2000, 2), new THREE.MeshPhongMaterial({color: 0x222222}));
                track1.rotation.x = -Math.PI/2; track1.position.set(0, 0.2, 8); laneGroup.add(track1);
                const track2 = track1.clone(); track2.position.z = -8; laneGroup.add(track2);

                
                const light = new THREE.Mesh(new THREE.BoxGeometry(4, 4, 4), new THREE.MeshPhongMaterial({color: 0x330000}));
                light.position.set(100, 15, 0);
                laneGroup.add(light);
                laneData.warningMesh = light;
            }

            if (type === 'road' || type === 'river') {
                const initialCount = type === 'road' ? 2 : 3;
                for(let i = 0; i < initialCount; i++) {
                    spawnVehicle(laneData, (Math.random() - 0.5) * 1000);
                }
            }

            scene.add(laneGroup);
            return laneData;
        }

        function spawnVehicle(lane, initialX) {

            let obj;
            if (lane.type === 'road') {
                obj = new THREE.Mesh(new THREE.BoxGeometry(25, 10, 15), new THREE.MeshPhongMaterial({ color: carColors[Math.floor(Math.random() * carColors.length)] }));
                obj.position.y = 5;
            } else if (lane.type === 'river') {
                obj = createLog();
            } else if (lane.type === 'rail') {
                obj = createTrain();
                lane.speed = 12;
            }
            
            obj.position.x = (initialX !== undefined) ? initialX : (lane.direction * -800);
            lane.mesh.add(obj);
            lane.vehicles.push(obj);
        }

        function setupInitialLanes() {
            lanes = [];
            for (let i = -5; i < 20; i++) {

                lanes.push(createLane(i));
            }
        }

        function handleKeyDown(e) {
            if (!gameActive) return;
            let nextX = bus.position.x;
            let nextZ = bus.position.z;
            let nextLaneIdx = currentLane;

            if (e.key === 'ArrowUp' || e.key === 'w') { nextZ += LANE_WIDTH; nextLaneIdx++; }
            else if (e.key === 'ArrowDown' || e.key === 's') { if (currentLane > -4) { nextZ -= LANE_WIDTH; nextLaneIdx--; } }
            else if (e.key === 'ArrowLeft' || e.key === 'a') { nextX += COLUMN_WIDTH; }
            else if (e.key === 'ArrowRight' || e.key === 'd') { nextX -= COLUMN_WIDTH; }

            const targetLane = lanes.find(l => l.index === nextLaneIdx);
            if (targetLane && targetLane.solids.includes(nextX)) return;

            bus.position.x = nextX;

            bus.position.z = nextZ;
            
            if (nextLaneIdx !== currentLane) {
                currentLane = nextLaneIdx;
                score = Math.max(score, currentLane);
                document.getElementById('score').innerText = score;
                if (currentLane + 15 > lanes[lanes.length - 1].index) {
                    lanes.push(createLane(lanes[lanes.length - 1].index + 1));
                }
            }
        }

        function startGame() {
            document.getElementById('overlay').classList.add('hidden');
            score = 0; 
            currentLane = 0;
            document.getElementById('score').innerText = score;
            bus.position.set(0, 0, 0);
            lanes.forEach(l => scene.remove(l.mesh));

            setupInitialLanes();
            gameActive = true;
        }

        function gameOver() {
            gameActive = false;
            document.getElementById('overlay').classList.remove('hidden');
            document.getElementById('overlay-title').innerText = "GAME OVER!";
            document.getElementById('overlay-desc').innerText = `Score: ${score}`;
            document.getElementById('start-btn').innerText = "RESTART";
        }

        function onWindowResize() {
            const aspect = window.innerWidth / window.innerHeight;
            const d = 150;
            camera.left = -d * aspect; camera.right = d * aspect;
            camera.top = d; camera.bottom = -d;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);

        }

        function animate() {
            requestAnimationFrame(animate);

            if (gameActive) {
                let onLog = false;

                lanes.forEach(lane => {
                    if (lane.type === 'road' && Math.random() < 0.007) spawnVehicle(lane);
                    if (lane.type === 'river' && Math.random() < 0.02) spawnVehicle(lane);
                    if (lane.type === 'rail') {
                        lane.trainTimer++;
                        if (lane.trainTimer > 180) {
                            if (lane.warningMesh) lane.warningMesh.material.color.set(Math.floor(Date.now()/200)%2 ? 0xff0000 : 0x330000);
                        }
                        if (lane.trainTimer > 240) {
                            spawnVehicle(lane);
                            lane.trainTimer = 0;

                            if (lane.warningMesh) lane.warningMesh.material.color.set(0x330000);
                        }
                    }

                    lane.vehicles.forEach((vehicle, idx) => {
                        vehicle.position.x += lane.speed * lane.direction;

                        const busWorldPos = new THREE.Vector3(); bus.getWorldPosition(busWorldPos);
                        const objWorldPos = new THREE.Vector3(); vehicle.getWorldPosition(objWorldPos);

                        if (Math.abs(busWorldPos.x - objWorldPos.x) < (lane.type === 'rail' ? 120 : 25) && 
                            Math.abs(busWorldPos.z - objWorldPos.z) < 15) {
                            if (lane.type === 'river') {
                                if (currentLane === lane.index) {
                                    onLog = true;
                                    bus.position.x += lane.speed * lane.direction;
                                }
                            } else {
                                gameOver();

                            }
                        }

                        if (Math.abs(vehicle.position.x) > 1000) {
                            lane.mesh.remove(vehicle);
                            lane.vehicles.splice(idx, 1);
                        }
                    });

                    if (currentLane === lane.index && lane.type === 'river' && !onLog) {
                        gameOver(); 
                    }
                });

                camera.position.z = THREE.MathUtils.lerp(camera.position.z, bus.position.z - 200, 0.1);
                camera.position.x = THREE.MathUtils.lerp(camera.position.x, bus.position.x + 100, 0.1);
                
                if (Math.abs(bus.position.x) > 400) gameOver();
            }


            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
